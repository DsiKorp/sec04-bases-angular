<h3>Agregar: {{ name() }}</h3>

<!-- #txtName referencia local
     input = onKeyup + onChange -->
<input [value]="name()" (change)="name.set(txtName.value)" (input)="name.set(txtName.value)" #txtName type="text"
  class="form-control" placeholder="Nombre del personaje">

<input [value]="power()" (change)="power.set(+txtPower.value)" (input)="power.set(+txtPower.value)" #txtPower
  type="number" class="form-control mt-2" placeholder="Poder">

<button (click)="addCharacter()" class="mt-2 btn btn-primary">Agregar</button>
